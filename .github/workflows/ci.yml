name: ci-cd

on:
  push:
  workflow_dispatch:

# один деплой за раз, без отмены середины ssh
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          PYTHONPATH: src
        run: pytest -q

  deploy:
    needs: tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      # нужны: secrets SSH_PRIVATE_KEY, SSH_HOST, SSH_USER
      # DEPLOY_PATH: repository variable ИЛИ secret с тем же именем (vars не читает Secrets)
      # опционально SSH_PORT в Variables или secret SSH_PORT
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Verify key loaded
        run: ssh-add -l

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH_VAR: ${{ vars.DEPLOY_PATH }}
          DEPLOY_PATH_SECRET: ${{ secrets.DEPLOY_PATH }}
          SSH_PORT_VAR: ${{ vars.SSH_PORT }}
          SSH_PORT_SECRET: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_PATH="${DEPLOY_PATH_VAR:-}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="${DEPLOY_PATH_SECRET:-}"
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH пустой. Укажи имя ровно DEPLOY_PATH:"
            echo "  Variables: Settings → Actions → Variables → New (например /opt/DymovaQuestBot)"
            echo "  или Secret DEPLOY_PATH — если путь хранишь в Secrets."
            echo "Если используешь Environment — переменная должна быть в том же Environment, что и job."
            exit 1
          fi
          PORT="${SSH_PORT_VAR:-${SSH_PORT_SECRET:-22}}"
          ssh -p "$PORT" \
            -o StrictHostKeyChecking=accept-new \
            -o IdentitiesOnly=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "set -euo pipefail; cd \"${DEPLOY_PATH}\"; git fetch origin; git checkout main; git pull --ff-only origin main; docker compose up -d --build"
